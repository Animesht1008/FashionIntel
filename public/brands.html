<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fashion Intel — Brand Directory</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<script type="module">
import { renderShell } from '/js/shell.js'
import { api }         from '/js/api.js'
import { toast }        from '/js/toast.js'
import { getLogoCandidates } from '/js/brandData.js'

renderShell('')

function escHtml(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

document.getElementById('app-body').innerHTML = `
  <div class="category-page">
    <div class="category-header">
      <div class="category-title">Brand Directory</div>
      <div class="category-sub">All fashion brands tracked by the intelligence agent</div>
    </div>
    <div id="brand-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px">
      <div style="grid-column:1/-1;text-align:center;padding:48px">
        <div class="spinner" style="width:24px;height:24px;margin:0 auto 10px"></div>
      </div>
    </div>
  </div>
`

async function init() {
  try {
    // Use the accurate server-side stats endpoint instead of
    // client-side counting against a capped article list — this
    // was the cause of brands showing "0 articles" incorrectly.
    const stats = await api.getCompetitorStats()

    const grid = document.getElementById('brand-grid')
    if (!stats.length) {
      grid.innerHTML = `<div style="grid-column:1/-1"><div class="empty-state">
        <div class="empty-icon">🏷️</div>
        <div class="empty-title">No brands added yet</div>
        <div class="empty-sub">Add brands in Manage Searches to build your directory.</div>
      </div></div>`
      return
    }

    grid.innerHTML = stats.map(b => {
      const count = b.stats?.total ?? 0
      const candidates = getLogoCandidates(b.name)
      const initial = b.name.charAt(0).toUpperCase()
      return `
        <a href="/brand?q=${encodeURIComponent(b.name)}" style="text-decoration:none">
          <div class="manager-card" style="padding:18px;text-align:center;transition:all .15s;cursor:pointer" onmouseover="this.style.borderColor='var(--ink)'" onmouseout="this.style.borderColor='var(--border)'">
            <div style="width:52px;height:52px;border-radius:50%;background:var(--bg-soft);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;color:var(--ink);margin:0 auto 10px;font-family:var(--font-display);overflow:hidden">
              <img src="${candidates[0]}" data-fallbacks='${JSON.stringify(candidates.slice(1))}' alt="" style="width:100%;height:100%;object-fit:contain;padding:8px"
                onerror="window.__logoErr(this,'${initial}')" />
            </div>
            <div style="font-weight:700;font-size:.88rem;color:var(--ink);font-family:var(--font-display)">${escHtml(b.name)}</div>
            <div style="font-size:.68rem;color:var(--ink-faint);margin-top:3px">${escHtml(b.category||'Fashion')}</div>
            <div style="font-size:.65rem;color:var(--ink-muted);margin-top:6px;font-family:var(--font-mono)">${count} article${count!==1?'s':''}</div>
            ${!b.is_active ? `<div style="font-size:.62rem;color:var(--ink-faint);margin-top:4px">○ Not actively monitored</div>` : ''}
          </div>
        </a>`
    }).join('')

  } catch(err) { toast.error('Failed to load: ' + err.message) }
}

init()
</script>
</body>
</html>
